<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ATAVA Rental Agreement System</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            background-color: #525659;
            font-family: Arial, sans-serif;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* Top Action Panel - Hidden on Print */
        .action-panel {
            background: #1e293b;
            color: #fff;
            padding: 15px 30px;
            border-radius: 8px;
            margin-bottom: 20px;
            text-align: center;
            width: 100%;
            max-width: 800px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }
        .action-panel h2 {
            font-size: 18px;
            margin-bottom: 5px;
            color: #38bdf8;
        }
        .action-panel p {
            font-size: 13px;
            color: #cbd5e1;
            margin-bottom: 12px;
        }
        .print-btn {
            background: #0ea5e9;
            color: white;
            border: none;
            padding: 10px 25px;
            font-size: 15px;
            font-weight: bold;
            border-radius: 5px;
            cursor: pointer;
            transition: 0.2s;
        }
        .print-btn:hover {
            background: #0284c7;
        }

        /* Container for A4 pages */
        .agreement-container {
            display: flex;
            flex-direction: column;
            gap: 30px;
        }

        /* A4 Page Style */
        .a4-page {
            width: 210mm;
            height: 297mm;
            position: relative;
            background-size: 100% 100%;
            background-repeat: no-repeat;
            background-position: center;
            box-shadow: 0 0 15px rgba(0,0,0,0.5);
            background-color: #fff;
        }

        /* ONLINE BACKGROUND IMAGES */
        .page-one {
            background-image: url('https://atavadigital.github.io/templates/Tenancy_Contract_01.jpg'), url('page1.jpg');
        }
        .page-two {
            background-image: url('https://atavadigital.github.io/templates/Tenancy_Contract_02.jpg'), url('page2.jpg');
        }

        /* Standard Input Styling inside Document */
        .field-input {
            position: absolute;
            border: none;
            background: transparent;
            font-size: 11px;
            font-weight: bold;
            color: #1e3a8a;
            padding: 2px 5px;
            outline: none;
            width: 100%;
            height: 100%;
            text-align: center;
        }
        .field-input:focus {
            background: rgba(56, 189, 248, 0.15);
        }

        .box-wrapper {
            position: absolute;
            display: flex;
            align-items: center;
        }

        /* PAGE 1 INPUT COORDINATES */
        #wrap-t-name { top: 18.2%; left: 17.5%; width: 25.5%; height: 1.8%; }
        #wrap-t-nat { top: 20.8%; left: 17.5%; width: 25.5%; height: 1.8%; }
        #wrap-t-id { top: 23.3%; left: 17.5%; width: 25.5%; height: 1.8%; }
        #wrap-t-phone { top: 25.8%; left: 17.5%; width: 25.5%; height: 1.8%; }
        #wrap-t-pobox { top: 28.3%; left: 17.5%; width: 25.5%; height: 1.8%; }
        #wrap-t-email { top: 30.8%; left: 17.5%; width: 25.5%; height: 1.8%; }

        #wrap-l-owner { top: 18.2%; left: 61.2%; width: 25.5%; height: 1.8%; }
        #wrap-l-landlord { top: 20.1%; left: 61.2%; width: 25.5%; height: 1.8%; }
        #wrap-l-nat { top: 23.3%; left: 61.2%; width: 25.5%; height: 1.8%; }
        #wrap-l-id { top: 25.8%; left: 61.2%; width: 25.5%; height: 1.8%; }
        #wrap-l-addr { top: 28.3%; left: 61.2%; width: 25.5%; height: 1.8%; }
        #wrap-l-phone { top: 30.8%; left: 61.2%; width: 25.5%; height: 1.8%; }
        #wrap-l-pobox { top: 33.3%; left: 61.2%; width: 25.5%; height: 1.8%; }
        #wrap-l-email { top: 35.8%; left: 61.2%; width: 25.5%; height: 1.8%; }

        #wrap-p-usage { top: 41.2%; left: 17.5%; width: 25.5%; height: 1.8%; }
        #wrap-p-dur { top: 43.8%; left: 17.5%; width: 25.5%; height: 1.8%; }
        #wrap-p-start { top: 46.8%; left: 17.5%; width: 25.5%; height: 1.8%; }
        #wrap-p-expiry { top: 49.8%; left: 17.5%; width: 25.5%; height: 1.8%; }
        #wrap-p-rent { top: 52.8%; left: 17.5%; width: 25.5%; height: 1.8%; }
        #wrap-p-ins { top: 55.4%; left: 17.5%; width: 25.5%; height: 1.8%; }
        #wrap-p-area { top: 58.0%; left: 17.5%; width: 25.5%; height: 1.8%; }

        #wrap-r-area { top: 41.2%; left: 61.2%; width: 25.5%; height: 1.8%; }
        #wrap-r-unit { top: 43.8%; left: 61.2%; width: 25.5%; height: 1.8%; }
        #wrap-r-fewa { top: 46.8%; left: 61.2%; width: 25.5%; height: 1.8%; }
        #wrap-r-addr { top: 49.8%; left: 61.2%; width: 25.5%; height: 1.8%; }
        #wrap-r-type { top: 52.8%; left: 61.2%; width: 25.5%; height: 1.8%; }
        #wrap-r-bname { top: 55.4%; left: 61.2%; width: 25.5%; height: 1.8%; }
        #wrap-r-desc { top: 58.0%; left: 61.2%; width: 25.5%; height: 1.8%; }
        #wrap-r-floor { top: 60.5%; left: 61.2%; width: 25.5%; height: 1.8%; }
        #wrap-r-land { top: 63.0%; left: 61.2%; width: 25.5%; height: 1.8%; }

        /* PAGE 2 INPUT COORDINATES */
        #wrap-cond-line1 { top: 12.3%; left: 8.0%; width: 80.5%; height: 1.5%; }
        #wrap-cond-line2 { top: 14.3%; left: 8.0%; width: 80.5%; height: 1.5%; }
        #wrap-cond-line3 { top: 16.3%; left: 8.0%; width: 80.5%; height: 1.5%; }
        #wrap-cond-line4 { top: 18.3%; left: 8.0%; width: 80.5%; height: 1.5%; }
        #wrap-cond-line5 { top: 20.3%; left: 8.0%; width: 80.5%; height: 1.5%; }
        #wrap-cond-line6 { top: 22.3%; left: 8.0%; width: 80.5%; height: 1.5%; }
        #wrap-cond-line7 { top: 24.3%; left: 8.0%; width: 80.5%; height: 1.5%; }

        .pay-row-1 { top: 36.2%; }
        .pay-row-2 { top: 40.3%; }
        .pay-row-3 { top: 44.4%; }
        .pay-row-4 { top: 48.5%; }
        .pay-row-5 { top: 52.6%; }
        .pay-row-6 { top: 56.7%; }

        .col-sig { left: 8.2%; width: 16.5%; height: 3.5%; }
        .col-date { left: 25.2%; width: 16.8%; height: 3.5%; }

        #wrap-sig-sec-date { top: 70.8%; left: 16.2%; width: 18.0%; height: 1.8%; }
        #wrap-sig-fst-date { top: 70.8%; left: 59.0%; width: 18.0%; height: 1.8%; }

        /* ===================================================
           PRINT STYLE WITH ZERO MARGIN TO REMOVE HEADERS
           =================================================== */
        @media print {
            @page {
                margin: 0; /* Removing margins automatically hides browser headers/footers */
            }
            body {
                background-color: #fff;
                padding: 0;
                margin: 0;
            }
            .action-panel {
                display: none;
            }
            .agreement-container {
                gap: 0;
            }
            .a4-page {
                box-shadow: none;
                page-break-after: always;
                width: 210mm;
                height: 297mm;
            }
            .field-input {
                color: #000 !important;
            }
        }
    </style>
</head>
